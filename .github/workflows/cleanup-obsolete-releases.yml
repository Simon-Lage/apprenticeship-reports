name: Cleanup obsolete releases

on:
  push:
    branches: ['develop']
    paths: ['.github/workflows/cleanup-obsolete-releases.yml']

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove obsolete releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          stable_release="$(gh api "repos/$GH_REPO/releases/tags/v0.0.35" --jq '[.id, .draft, .prerelease] | @tsv')"
          if [ "$stable_release" != $'355650380\tfalse\tfalse' ]; then
            echo "Stable v0.0.35 release is not ready: $stable_release" >&2
            exit 1
          fi

          delete_release() {
            local tag="$1"
            local expected_id="$2"
            local release_id

            release_id="$(gh api "repos/$GH_REPO/releases/tags/$tag" --jq '.id')"
            if [ "$release_id" != "$expected_id" ]; then
              echo "Unexpected release ID for $tag: $release_id" >&2
              exit 1
            fi

            gh api --method DELETE "repos/$GH_REPO/releases/$release_id"
            gh api --method DELETE "repos/$GH_REPO/git/refs/tags/$tag"
          }

          delete_release "v0.0.39" "355620176"
          delete_release "v0.0.34-alpha.1" "355245952"
