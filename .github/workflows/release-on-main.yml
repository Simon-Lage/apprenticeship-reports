name: Release on main

on:
  push:
    branches: [ "main" ]

jobs:
  build-win:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      # 1) Version lokal erhöhen, aber KEIN Tag/Push
      - name: Bump version (patch) locally only
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          $ver = node -p "require('./package.json').version"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "v$ver"

      - name: Install deps
        run: npm ci

      - name: Validate Google OAuth config
        shell: pwsh
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID || secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_OAUTH_CLIENT_ID)) {
            throw "Missing GOOGLE_OAUTH_CLIENT_ID repository variable or secret for release build."
          }

      - name: Build app (webpack -> release/app)
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID || secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_DRIVE_REQUIRED_SCOPES: https://www.googleapis.com/auth/drive.file
        run: npm run build

      - name: Validate PFX password
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CSC_LINK }}")
          $pfx   = "$env:RUNNER_TEMP\cs.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)
          certutil -p "${{ secrets.CSC_KEY_PASSWORD }}" -dump $pfx

      # 2) Installer bauen, Release aber erst nach Commit + Tag erstellen
      - name: Package installer
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          Write-Host "Packaging with version $env:ver"
          npx electron-builder --win nsis --publish never --config.extraMetadata.version="$env:ver"

      # 3) README vor dem Release-Commit aktualisieren
      - name: Update README.md with latest version and dates
        shell: pwsh
        run: |
          $ver = $env:ver
          $dateDE = (Get-Date).ToString('dd.MM.yyyy')
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $download = "https://github.com/$owner/$repo/releases/latest/download/Apprenticeship-Reports-Setup.exe"

          function Replace-ReadmeValue {
            param(
              [string]$Text,
              [string]$Pattern,
              [scriptblock]$Replacement,
              [string]$Name
            )

            $regex = [regex]::new($Pattern)
            if (-not $regex.IsMatch($Text)) {
              throw "README marker not found: $Name"
            }

            return $regex.Replace($Text, { param($match) & $Replacement $match }, 1)
          }

          $content = Get-Content -Path README.md -Raw
          $content = Replace-ReadmeValue $content '\[Download for Windows\]\([^)]+\)' { param($match) "[Download for Windows]($download)" } 'download link'
          $content = Replace-ReadmeValue $content '(- Version:\s*)`[^`]+`' { param($match) "$($match.Groups[1].Value)``v$ver``" } 'version'
          $content = Replace-ReadmeValue $content '(- Ver[^\r\n]* am:\s*)`[^`]+`' { param($match) "$($match.Groups[1].Value)``$dateDE``" } 'publish date'
          Set-Content -Path README.md -Value $content -Encoding UTF8 -NoNewline

      # 4) Erst nach erfolgreichem Installer-Build taggen
      - name: Commit bumped version and push tag
        if: ${{ success() }}
        shell: bash
        run: |
          if ! git diff --quiet; then
            git add package.json package-lock.json README.md || true
            git commit -m "ci(release): v${{ env.ver }} [skip ci]"
          fi
          git tag "v${{ env.ver }}"
          git push origin HEAD:${{ github.ref_name }} "v${{ env.ver }}"

      # 5) Release explizit mit den gebauten Assets erstellen
      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = $env:ver
          $tag = "v$ver"
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $download = "https://github.com/$owner/$repo/releases/latest/download/Apprenticeship-Reports-Setup.exe"

          $body = @"
          **Download & Hinweise**

          Nur die Datei "Apprenticeship-Reports-Setup.exe" herunterladen und ausführen.

          - Die Dateien "latest.yml" und "*.exe.blockmap" sind für den Auto-Updater.
          - "Source code (zip/tar.gz)" wird von GitHub automatisch erzeugt.

          Direktdownload: $download

          ---

          **Download & Notes**

          Download and run only "Apprenticeship-Reports-Setup.exe".

          - "latest.yml" and "*.exe.blockmap" are for the auto-updater.
          - "Source code (zip/tar.gz)" is auto-generated by GitHub.

          Direct download: $download
          "@

          $bodyPath = Join-Path $env:RUNNER_TEMP "release-body.md"
          Set-Content -Path $bodyPath -Value $body.Trim() -Encoding UTF8

          $assets = @(
            "release/build/Apprenticeship-Reports-Setup.exe",
            "release/build/latest.yml"
          )
          $blockmaps = @(Get-ChildItem -Path "release/build" -Filter "*.blockmap" -File)
          if ($blockmaps.Count -eq 0) {
            throw "Missing release asset: *.blockmap"
          }
          $assets += @($blockmaps | ForEach-Object { $_.FullName })

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) {
              throw "Missing release asset: $asset"
            }
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $tag --title $tag --notes-file $bodyPath --latest
          } else {
            gh release create $tag @assets --title $tag --notes-file $bodyPath --latest
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
